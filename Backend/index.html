<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocMind — Document Intelligence</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --bg2: #17171a;
    --bg3: #1e1e22;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --muted: #888;
    --accent: #7c6ff7;
    --accent2: #5d57c9;
    --success: #2dd4a0;
    --danger: #f07070;
    --warning: #f0b429;
    --radius: 10px;
    --radius-lg: 14px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 0;
  }

  .sidebar-header {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .logo span { color: var(--accent); }

  .sidebar-section {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }

  .upload-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 18px 12px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: rgba(124,111,247,0.05); }

  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }

  .upload-icon {
    font-size: 22px;
    margin-bottom: 6px;
    color: var(--muted);
  }

  .upload-zone p { font-size: 12px; color: var(--muted); }
  .upload-zone strong { color: var(--accent); font-weight: 500; }

  .doc-list { display: flex; flex-direction: column; gap: 6px; }

  .doc-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
    position: relative;
  }

  .doc-item:hover { border-color: var(--border2); }
  .doc-item.selected { border-color: var(--accent); background: rgba(124,111,247,0.08); }

  .doc-icon { font-size: 16px; color: var(--accent); flex-shrink: 0; }

  .doc-info { flex: 1; min-width: 0; }
  .doc-name { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc-meta { font-size: 11px; color: var(--muted); }

  .doc-check {
    width: 16px; height: 16px;
    border: 1.5px solid var(--border2);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }

  .doc-item.selected .doc-check {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-size: 10px;
  }

  .doc-delete {
    width: 20px; height: 20px;
    border: none;
    background: transparent;
    color: transparent;
    cursor: pointer;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
    transition: all 0.15s;
    margin-left: 2px;
  }

  .doc-item:hover .doc-delete { color: var(--muted); }
  .doc-delete:hover { color: var(--danger) !important; background: rgba(240,112,112,0.1); }

  .mode-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 500;
  }

  .mode-badge.query { background: rgba(124,111,247,0.15); color: #a59ff7; }
  .mode-badge.compare { background: rgba(45,212,160,0.12); color: #2dd4a0; }
  .mode-badge.extract { background: rgba(240,180,41,0.12); color: #f0b429; }

  .sidebar-footer { padding: 14px 18px; margin-top: auto; }

  .clear-btn {
    width: 100%;
    padding: 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
  }

  .clear-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* Main */
  .main {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  .topbar {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .mode-switcher {
    display: flex;
    gap: 4px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 3px;
  }

  .mode-btn {
    padding: 5px 14px;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: 7px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
  }

  .mode-btn.active {
    background: var(--bg3);
    color: var(--text);
    border: 1px solid var(--border2);
  }

  .status-bar {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--success);
    display: inline-block;
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    text-align: center;
    padding: 40px;
  }

  .empty-icon { font-size: 40px; color: var(--border2); }
  .empty-state h2 { font-size: 18px; font-weight: 500; color: var(--muted); }
  .empty-state p { font-size: 13px; color: var(--muted); max-width: 320px; opacity: 0.7; }

  .message {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: 820px;
  }

  .message.user { align-self: flex-end; align-items: flex-end; }
  .message.assistant { align-self: flex-start; align-items: flex-start; }

  .message-label { font-size: 11px; color: var(--muted); padding: 0 4px; }

  .message-bubble {
    padding: 12px 16px;
    border-radius: var(--radius-lg);
    font-size: 14px;
    line-height: 1.65;
    max-width: 680px;
  }

  .message.user .message-bubble {
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .message.assistant .message-bubble {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  .sources-block {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .sources-label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }

  .source-chip {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    border-left: 2px solid var(--accent);
  }

  .feedback-row {
    display: flex;
    gap: 6px;
    margin-top: 6px;
    align-items: center;
  }

  .feedback-btn {
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .feedback-btn:hover { border-color: var(--border2); color: var(--text); }
  .feedback-btn.up:hover, .feedback-btn.up.active { border-color: var(--success); color: var(--success); background: rgba(45,212,160,0.08); }
  .feedback-btn.down:hover, .feedback-btn.down.active { border-color: var(--danger); color: var(--danger); background: rgba(240,112,112,0.08); }

  .feedback-label { font-size: 11px; color: var(--muted); }

  /* Extract panel */
  .extract-panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    max-width: 680px;
  }

  .extract-panel h3 { font-size: 13px; font-weight: 500; margin-bottom: 12px; color: var(--muted); }

  .field-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }

  .field-tag {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 12px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .field-tag button {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0;
  }

  .field-input-row {
    display: flex;
    gap: 6px;
  }

  .field-input-row input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    border-radius: var(--radius);
    font-size: 13px;
    outline: none;
  }

  .field-input-row input:focus { border-color: var(--accent); }

  .field-input-row button {
    padding: 7px 14px;
    background: var(--accent2);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 12px;
  }

  .extracted-result {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    margin-top: 10px;
  }

  .extracted-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .extracted-row:last-child { border-bottom: none; }
  .extracted-key { color: var(--muted); }
  .extracted-val { color: var(--text); font-weight: 500; max-width: 60%; text-align: right; word-break: break-word; }

  /* Input area */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-wrapper {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }

  .input-wrapper:focus-within { border-color: var(--accent); }

  .input-wrapper textarea {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 14px;
    resize: none;
    outline: none;
    line-height: 1.6;
    max-height: 120px;
    font-family: inherit;
  }

  .input-wrapper textarea::placeholder { color: var(--muted); }

  .send-btn {
    width: 34px; height: 34px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }

  .send-btn:hover { background: var(--accent2); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .input-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    text-align: center;
  }

  /* Loading */
  .typing {
    display: flex;
    gap: 4px;
    padding: 14px 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .typing span {
    width: 6px; height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* Upload progress */
  .upload-progress {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 16px;
    font-size: 13px;
    color: var(--text);
    z-index: 100;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .empty-docs {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    padding: 12px;
    opacity: 0.6;
  }

  pre { white-space: pre-wrap; word-break: break-word; font-family: inherit; }

  .md h1, .md h2, .md h3 { font-weight: 600; margin: 12px 0 6px; color: var(--text); }
  .md h1 { font-size: 16px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .md h2 { font-size: 15px; }
  .md h3 { font-size: 14px; color: #a59ff7; }
  .md p { margin: 6px 0; }
  .md strong { font-weight: 600; color: var(--text); }
  .md em { font-style: italic; color: #c9c5f7; }
  .md code { background: rgba(255,255,255,0.08); border: 1px solid var(--border2); border-radius: 4px; padding: 1px 6px; font-family: 'Consolas', monospace; font-size: 12px; color: #7dd3fc; }
  .md pre { background: #0d0d10; border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin: 8px 0; overflow-x: auto; }
  .md pre code { background: none; border: none; padding: 0; font-size: 13px; color: #e2e8f0; }
  .md ul, .md ol { padding-left: 20px; margin: 6px 0; }
  .md li { margin: 3px 0; }
  .md ul li { list-style-type: disc; }
  .md ol li { list-style-type: decimal; }
  .md blockquote { border-left: 3px solid var(--accent); padding: 6px 12px; margin: 8px 0; background: rgba(124,111,247,0.06); border-radius: 0 var(--radius) var(--radius) 0; color: #c9c5f7; }
  .md hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
  .md a { color: var(--accent); text-decoration: none; }
  .doc-id-tag { display: inline-block; background: rgba(124,111,247,0.15); color: #a59ff7; border: 1px solid rgba(124,111,247,0.3); border-radius: 4px; padding: 1px 6px; font-size: 11px; font-family: monospace; font-weight: 500; }
</style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">Doc<span>Mind</span></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Upload documents</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept=".pdf,.docx" multiple />
        <div class="upload-icon">📄</div>
        <p><strong>Click to upload</strong></p>
        <p>PDF or DOCX files</p>
      </div>
      <div id="uploadStatus" style="margin-top: 8px;"></div>
    </div>

    <div class="sidebar-section" style="flex: 1; overflow-y: auto;">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
        <div class="sidebar-label" style="margin: 0;">Documents</div>
        <span id="modeIndicator" class="mode-badge query">query</span>
      </div>
      <div class="doc-list" id="docList">
        <div class="empty-docs">No documents yet</div>
      </div>
    </div>

    <div class="sidebar-footer">
      <button class="clear-btn" onclick="clearAll()">Clear all documents</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <div class="mode-switcher">
        <button class="mode-btn active" onclick="setMode('query')" id="btn-query">Query</button>
        <button class="mode-btn" onclick="setMode('extract')" id="btn-extract">Extract</button>
        <button class="mode-btn" onclick="setMode('compare')" id="btn-compare">Compare</button>
      </div>
      <div class="status-bar">
        <span class="dot"></span>
        <span id="statusText">Connected to localhost:8000</span>
      </div>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🔍</div>
        <h2>Upload documents to get started</h2>
        <p>Upload one or more PDFs, then ask questions, extract fields, or compare across documents.</p>
      </div>
    </div>

    <!-- Extract panel (shown in extract mode) -->
    <div id="extractPanel" style="display:none; padding: 0 24px 12px;">
      <div class="extract-panel">
        <h3>Fields to extract</h3>
        <div class="field-tags" id="fieldTags"></div>
        <div class="field-input-row">
          <input type="text" id="fieldInput" placeholder="Add field (e.g. invoice_total)" onkeydown="if(event.key==='Enter') addField()" />
          <button onclick="addField()">Add</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="queryInput" rows="1" placeholder="Ask a question about your documents..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="handleSend()">➤</button>
      </div>
      <div class="input-hint" id="inputHint">Upload a document to start</div>
    </div>
  </main>
</div>

<script>
const API = 'http://localhost:8000';
let docs = [];
let selectedDocs = [];
let mode = 'query';
let extractFields = [];
let messages = [];

async function init() {
  try {
    const r = await fetch(`${API}/documents`);
    const data = await r.json();
    docs = data.documents || [];
    renderDocs();
  } catch(e) {
    document.getElementById('statusText').textContent = 'Cannot connect to backend';
    document.querySelector('.dot').style.background = '#f07070';
  }
}

function renderDocs() {
  const list = document.getElementById('docList');
  if (!docs.length) {
    list.innerHTML = '<div class="empty-docs">No documents yet</div>';
    updateHint();
    return;
  }
  list.innerHTML = docs.map((d, i) => `
    <div class="doc-item ${selectedDocs.includes(d.doc_id) ? 'selected' : ''}" onclick="toggleDoc('${d.doc_id}')">
      <div class="doc-icon">📄</div>
      <div class="doc-info">
        <div class="doc-name" title="${d.filename || d.doc_id}">${d.filename || 'Document ' + (i+1)}</div>
        <div class="doc-meta">${d.chunk_count} chunks</div>
      </div>
      <div class="doc-check">${selectedDocs.includes(d.doc_id) ? '✓' : ''}</div>
      <button class="doc-delete" onclick="deleteDoc(event, '${d.doc_id}')" title="Remove document">✕</button>
    </div>
  `).join('');
  updateHint();
  updateModeIndicator();
}

function toggleDoc(docId) {
  if (selectedDocs.includes(docId)) {
    selectedDocs = selectedDocs.filter(d => d !== docId);
  } else {
    if (mode === 'query' || mode === 'extract') {
      selectedDocs = [docId];
    } else {
      selectedDocs.push(docId);
    }
  }
  renderDocs();
}

function updateModeIndicator() {
  const el = document.getElementById('modeIndicator');
  const count = selectedDocs.length;
  if (count === 0) {
    el.className = 'mode-badge query'; el.textContent = 'none selected';
  } else if (count === 1 && mode !== 'compare') {
    el.className = 'mode-badge query'; el.textContent = 'query mode';
  } else if (count > 1 || mode === 'compare') {
    el.className = 'mode-badge compare'; el.textContent = 'compare mode';
  }
  if (mode === 'extract') {
    el.className = 'mode-badge extract'; el.textContent = 'extract mode';
  }
}

function updateHint() {
  const hint = document.getElementById('inputHint');
  const btn = document.getElementById('sendBtn');
  if (!docs.length) {
    hint.textContent = 'Upload a document to start';
    btn.disabled = true;
    return;
  }
  if (!selectedDocs.length) {
    hint.textContent = 'Select a document from the sidebar';
    btn.disabled = true;
    return;
  }
  if (mode === 'compare' && selectedDocs.length < 2) {
    hint.textContent = 'Select at least 2 documents to compare';
    btn.disabled = true;
    return;
  }
  btn.disabled = false;
  if (mode === 'query') hint.textContent = `Querying 1 document · Enter to send`;
  if (mode === 'extract') hint.textContent = `Extracting from 1 document · Add fields above`;
  if (mode === 'compare') hint.textContent = `Comparing ${selectedDocs.length} documents · Enter to send`;
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + m).classList.add('active');
  document.getElementById('extractPanel').style.display = m === 'extract' ? 'block' : 'none';
  const placeholder = {
    query: 'Ask a question about your documents...',
    extract: 'Describe what to extract (or just click send)...',
    compare: 'What should I compare across these documents?'
  };
  document.getElementById('queryInput').placeholder = placeholder[m];
  if (m !== 'compare') selectedDocs = selectedDocs.slice(0, 1);
  updateModeIndicator();
  updateHint();
}

function addField() {
  const input = document.getElementById('fieldInput');
  const val = input.value.trim().replace(/\s+/g, '_').toLowerCase();
  if (!val || extractFields.includes(val)) return;
  extractFields.push(val);
  input.value = '';
  renderFields();
}

function removeField(f) {
  extractFields = extractFields.filter(x => x !== f);
  renderFields();
}

function renderFields() {
  document.getElementById('fieldTags').innerHTML = extractFields.map(f => `
    <div class="field-tag">${f}<button onclick="removeField('${f}')">×</button></div>
  `).join('');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function hideEmpty() {
  const e = document.getElementById('emptyState');
  if (e) e.style.display = 'none';
}

function addMessage(role, content, extras) {
  hideEmpty();
  const chat = document.getElementById('chatArea');

  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;

  const label = document.createElement('div');
  label.className = 'message-label';
  label.textContent = role === 'user' ? 'You' : 'DocMind';
  wrap.appendChild(label);

  const bubble = document.createElement('div');
  bubble.className = role === 'assistant' ? 'message-bubble md' : 'message-bubble';
  bubble.innerHTML = role === 'assistant' ? renderMarkdown(content) : content.replace(/\n/g, '<br>');
  wrap.appendChild(bubble);

  if (role === 'assistant' && extras) {
    if (extras.sources && extras.sources.length) {
      const sb = document.createElement('div');
      sb.className = 'sources-block';
      sb.innerHTML = `<div class="sources-label">Sources</div>` +
        extras.sources.slice(0, 3).map(s => `
          <div class="source-chip">${s.text.slice(0, 160)}${s.text.length > 160 ? '…' : ''}</div>
        `).join('');
      wrap.appendChild(sb);
    }

    if (extras.response_id) {
      const fb = document.createElement('div');
      fb.className = 'feedback-row';
      fb.id = 'fb-' + extras.response_id;
      fb.innerHTML = `
        <span class="feedback-label">Was this helpful?</span>
        <button class="feedback-btn up" onclick="sendFeedback('${extras.response_id}', true, this)">👍 Yes</button>
        <button class="feedback-btn down" onclick="sendFeedback('${extras.response_id}', false, this)">👎 No</button>
      `;
      wrap.appendChild(fb);
    }

    if (extras.extracted) {
      const ex = document.createElement('div');
      ex.className = 'extracted-result';
      ex.innerHTML = Object.entries(extras.extracted).map(([k, v]) => {
        const val = typeof v === 'object' ? JSON.stringify(v, null, 2) : v;
        return `<div class="extracted-row"><span class="extracted-key">${k}</span><span class="extracted-val">${val}</span></div>`;
      }).join('');
      bubble.appendChild(ex);
    }
  }

  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return wrap;
}

function addTyping() {
  hideEmpty();
  const chat = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = 'message assistant';
  wrap.id = 'typing-indicator';
  wrap.innerHTML = `<div class="message-label">DocMind</div><div class="typing"><span></span><span></span><span></span></div>`;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function handleSend() {
  const input = document.getElementById('queryInput');
  const q = input.value.trim();
  if (!q && mode !== 'extract') return;
  if (!selectedDocs.length) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  if (mode === 'query') await doQuery(q);
  else if (mode === 'extract') await doExtract(q);
  else if (mode === 'compare') await doCompare(q);

  document.getElementById('sendBtn').disabled = false;
  updateHint();
}

async function doQuery(q) {
  addMessage('user', q);
  addTyping();
  try {
    const r = await fetch(`${API}/query`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ question: q })
    });
    const data = await r.json();
    removeTyping();
    addMessage('assistant', data.answer, {
      sources: data.sources,
      response_id: data.response_id
    });
  } catch(e) {
    removeTyping();
    addMessage('assistant', 'Something went wrong. Is the backend running?');
  }
}

async function doExtract(q) {
  if (!extractFields.length) {
    showToast('Add at least one field to extract');
    return;
  }
  const label = `Extract: ${extractFields.join(', ')}`;
  addMessage('user', label);
  addTyping();
  try {
    const r = await fetch(`${API}/extract`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ doc_id: selectedDocs[0], fields: extractFields })
    });
    const data = await r.json();
    removeTyping();
    addMessage('assistant', 'Extracted fields:', { extracted: data.extracted_fields });
  } catch(e) {
    removeTyping();
    addMessage('assistant', 'Extraction failed. Check backend logs.');
  }
}

async function doCompare(q) {
  if (selectedDocs.length < 2) { showToast('Select at least 2 documents'); return; }
  addMessage('user', q);
  addTyping();
  try {
    const r = await fetch(`${API}/compare`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ doc_ids: selectedDocs, query: q })
    });
    const data = await r.json();
    removeTyping();
    addMessage('assistant', data.comparison, { response_id: data.response_id });
  } catch(e) {
    removeTyping();
    addMessage('assistant', 'Comparison failed. Check backend logs.');
  }
}

async function sendFeedback(responseId, helpful, btn) {
  const row = document.getElementById('fb-' + responseId);
  try {
    await fetch(`${API}/feedback`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ response_id: responseId, helpful })
    });
    row.innerHTML = `<span class="feedback-label">${helpful ? '👍 Marked helpful' : '👎 Feedback recorded'}</span>`;
  } catch(e) {
    showToast('Could not save feedback');
  }
}

document.getElementById('fileInput').addEventListener('change', async function() {
  const files = Array.from(this.files);
  for (const file of files) {
    await uploadFile(file);
  }
  this.value = '';
});

const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', async e => {
  e.preventDefault();
  zone.classList.remove('drag');
  const files = Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.pdf') || f.name.endsWith('.docx'));
  for (const file of files) await uploadFile(file);
});

async function uploadFile(file) {
  const status = document.getElementById('uploadStatus');
  status.innerHTML = `<div class="upload-progress"><div class="spinner"></div>Uploading ${file.name}…</div>`;
  try {
    const form = new FormData();
    form.append('file', file);
    const r = await fetch(`${API}/upload`, { method: 'POST', body: form });
    const data = await r.json();
    docs.push({ doc_id: data.doc_id, filename: file.name, chunk_count: '?' });
    selectedDocs = [data.doc_id];
    renderDocs();
    status.innerHTML = '';
    showToast(`✓ ${file.name} uploaded`);
    await init();
  } catch(e) {
    status.innerHTML = '';
    showToast(`Failed to upload ${file.name}`);
  }
}

async function deleteDoc(event, docId) {
  event.stopPropagation();
  const doc = docs.find(d => d.doc_id === docId);
  const name = doc?.filename || docId.slice(0, 8) + '...';
  if (!confirm(`Remove "${name}" from context?`)) return;
  try {
    const r = await fetch(`${API}/documents/${docId}`, { method: 'DELETE' });
    const data = await r.json();
    if (data.error) { showToast(data.error); return; }
    docs = docs.filter(d => d.doc_id !== docId);
    selectedDocs = selectedDocs.filter(d => d !== docId);
    renderDocs();
    showToast(`✓ "${name}" removed`);
  } catch(e) {
    showToast('Failed to remove document');
  }
}

function clearAll() {
  if (!confirm('Clear all documents and chat history?')) return;
  docs = []; selectedDocs = []; messages = [];
  renderDocs();
  const chat = document.getElementById('chatArea');
  chat.innerHTML = `<div class="empty-state" id="emptyState">
    <div class="empty-icon">🔍</div>
    <h2>Upload documents to get started</h2>
    <p>Upload one or more PDFs, then ask questions, extract fields, or compare across documents.</p>
  </div>`;
  showToast('Cleared');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function renderMarkdown(text) {
  // Highlight doc IDs (UUIDs)
  text = text.replace(/\b([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})\b/gi,
    '<span class="doc-id-tag">$1</span>');
  // Code blocks
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code.trim().replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`);
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headers
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold + italic
  text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Blockquotes
  text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // HR
  text = text.replace(/^---$/gm, '<hr>');
  // Unordered lists
  text = text.replace(/((?:^[\*\-] .+\n?)+)/gm, (match) => {
    const items = match.trim().split('\n').map(l => `<li>${l.replace(/^[\*\-] /, '')}</li>`).join('');
    return `<ul>${items}</ul>`;
  });
  // Ordered lists
  text = text.replace(/((?:^\d+\. .+\n?)+)/gm, (match) => {
    const items = match.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('');
    return `<ol>${items}</ol>`;
  });
  // Paragraphs
  text = text.split('\n').map(line => {
    if (!line.trim()) return '';
    if (/^<(h[123]|ul|ol|li|pre|blockquote|hr)/.test(line)) return line;
    return `<p>${line}</p>`;
  }).join('');
  return text;
}

init();
</script>
</body>
